<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Cascade Apartment 6</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--color-primary) 0%, #1a3a5c 60%, #0f2744 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-xl);
            font-family: var(--font-secondary);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: var(--space-2xl);
        }
        .login-logo-icon {
            width: 64px;
            height: 64px;
            border-radius: var(--radius-xl);
            background: rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-md);
            backdrop-filter: blur(10px);
        }
        .login-logo-icon svg { color: white; }
        .login-logo-name {
            font-family: var(--font-primary);
            font-size: var(--font-size-xl);
            font-weight: var(--font-weight-bold);
            color: white;
            margin-bottom: 4px;
        }
        .login-logo-sub {
            font-size: var(--font-size-sm);
            color: rgba(255,255,255,0.6);
        }

        .login-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--space-2xl);
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }

        .login-title {
            font-family: var(--font-primary);
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            color: var(--color-darker);
            margin-bottom: var(--space-xs);
        }
        .login-subtitle {
            font-size: var(--font-size-sm);
            color: var(--color-gray);
            margin-bottom: var(--space-xl);
        }

        .login-form { display: flex; flex-direction: column; gap: var(--space-md); }

        .login-field { display: flex; flex-direction: column; gap: var(--space-xs); }
        .login-label {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--color-dark);
        }
        .login-input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--color-light);
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            font-family: var(--font-secondary);
            color: var(--color-darker);
            background: var(--color-white);
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
            outline: none;
        }
        .login-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(15,39,68,0.1);
        }
        .login-input.error { border-color: #dc2626; }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            font-family: var(--font-secondary);
            cursor: pointer;
            transition: background var(--transition-fast);
            margin-top: var(--space-xs);
        }
        .login-btn:hover { background: #1a3a5c; }
        .login-btn:active { transform: translateY(1px); }

        .login-error {
            display: none;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: var(--radius-md);
            padding: var(--space-sm) var(--space-md);
            font-size: var(--font-size-xs);
            color: #dc2626;
            margin-top: var(--space-sm);
        }
        .login-error.visible { display: block; }

        .login-back {
            text-align: center;
            margin-top: var(--space-lg);
        }
        .login-back a {
            font-size: var(--font-size-xs);
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: color var(--transition-fast);
        }
        .login-back a:hover { color: white; }

        .login-security-note {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            font-size: var(--font-size-xs);
            color: var(--color-muted);
            margin-top: var(--space-md);
            justify-content: center;
        }
        .login-security-note svg { flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="login-container">

        <!-- Logo -->
        <div class="login-logo">
            <div class="login-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </div>
            <div class="login-logo-name">Cascade Apartment 6</div>
            <div class="login-logo-sub">Admin Portal</div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <h1 class="login-title">Sign In</h1>
            <p class="login-subtitle">Enter your admin credentials to access the panel</p>

            <form class="login-form" id="loginForm" autocomplete="off">

                <div class="login-field">
                    <label class="login-label" for="adminEmail">Email Address</label>
                    <input
                        type="email"
                        id="adminEmail"
                        class="login-input"
                        placeholder="admin@cascadeapartment6.com.au"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="login-field">
                    <label class="login-label" for="adminPassword">Password</label>
                    <input
                        type="password"
                        id="adminPassword"
                        class="login-input"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <div class="login-error" id="loginError">
                    Invalid email or password. Please try again.
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Sign In</button>

                <div class="login-security-note">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    Secured admin area — authorised access only
                </div>

            </form>
        </div>

        <div class="login-back">
            <a href="../index.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12" style="vertical-align: middle; margin-right: 4px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Return to website
            </a>
        </div>

    </div>

    <script>
        // Admin credentials — in production these would be verified server-side
        var ADMIN_CREDENTIALS = [
            { email: 'typhoon.tall69@gmail.com', password: 'CascadeAdmin2026!', role: 'owner' },
            { email: 'admin@cascadeapartment6.com.au', password: 'Admin2026!', role: 'admin' }
        ];

        // If already logged in, redirect to dashboard
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            var emailInput = document.getElementById('adminEmail');
            var passwordInput = document.getElementById('adminPassword');
            var errorEl = document.getElementById('loginError');
            var btn = document.getElementById('loginBtn');

            var email = emailInput.value.trim().toLowerCase();
            var password = passwordInput.value;

            // Reset state
            errorEl.classList.remove('visible');
            emailInput.classList.remove('error');
            passwordInput.classList.remove('error');
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            // Simulate a brief delay for UX
            setTimeout(function() {
                var matched = ADMIN_CREDENTIALS.find(function(c) {
                    return c.email === email && c.password === password;
                });

                if (matched) {
                    // Store auth state
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    sessionStorage.setItem('adminEmail', matched.email);
                    sessionStorage.setItem('adminRole', matched.role);

                    // Redirect to dashboard (or where they came from)
                    var redirect = sessionStorage.getItem('adminRedirect') || 'index.html';
                    sessionStorage.removeItem('adminRedirect');
                    window.location.href = redirect;
                } else {
                    // Show error
                    emailInput.classList.add('error');
                    passwordInput.classList.add('error');
                    errorEl.classList.add('visible');
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            }, 600);
        });
    </script>
</body>
</html>
