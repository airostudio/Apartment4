<svg viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cascade Apartment 4">
  <title>Cascade Apartment 4</title>

  <!-- Mountain ridge: three peaks -->
  <path d="M 4 68 L 18 32 L 28 46 L 42 8 L 56 42 L 66 26 L 80 68"
        stroke="#1C3557" stroke-width="3.5" stroke-linejoin="round"
        stroke-linecap="round" fill="none"/>

  <!-- Snow caps on peaks -->
  <path d="M 15 39 L 18 32 L 21 39 Z"   fill="#D6E9F5" opacity="0.9"/>
  <path d="M 38 15 L 42 8  L 46 15 Z"   fill="#D6E9F5" opacity="0.9"/>
  <path d="M 63 33 L 66 26 L 69 33 Z"   fill="#D6E9F5" opacity="0.9"/>

  <!-- Cascade waterfall lines (beneath and right of centre peak) -->
  <path d="M 44 52 Q 48 50 52 52" stroke="#5BA4C8" stroke-width="2"   fill="none" stroke-linecap="round"/>
  <path d="M 43 58 Q 47.5 56 52 58" stroke="#5BA4C8" stroke-width="2"   fill="none" stroke-linecap="round"/>
  <path d="M 42 64 Q 47 62 52 64" stroke="#5BA4C8" stroke-width="2"   fill="none" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="96" y="42"
        font-family="'Playfair Display', Georgia, serif"
        font-weight="700"
        font-size="28"
        letter-spacing="5"
        fill="#1C3557">CASCADE</text>

  <text x="97" y="64"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="12.5"
        letter-spacing="4"
        fill="#5BA4C8">APARTMENT 4</text>

  <!-- Divider line between icon and text -->
  <line x1="88" y1="16" x2="88" y2="68"
        stroke="#1C3557" stroke-width="1" opacity="0.15"/>
</svg>
